name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Ver si el runner ve Docker
        shell: bash
        run: |
          whoami
          echo $HOME
          which docker || true
          docker --version || true
          docker info || true
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}
      - name: Diagnóstico Docker (self-hosted)
        shell: bash
        run: |
          set -euxo pipefail
          docker version
          docker info
          docker buildx version || true
          docker buildx ls || true
      - name: Probar pull de BuildKit
        shell: bash
        run: |
          set -euxo pipefail
          docker pull moby/buildkit:buildx-stable-1
      - name: Limpiar builders antiguos (self-hosted)
        shell: bash
        run: |
          set -euxo pipefail
          docker buildx prune -af || true
      - name: Set image name (lowercase)
        id: meta
        shell: bash
        run: |
          set -e
          IMAGE="ghcr.io/$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
      - name: Update GitOps repository
        shell: bash
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
          # Configure git credential store
          IMAGE="${{ steps.meta.outputs.image }}:${{ github.sha }}"
          git config --global credential.helper store
          echo "https://${GIT_TOKEN}:x-oauth-basic@github.com" > ~/.git-credentials
          
          # Remove any existing gitops directory
          rm -rf gitops
          
          # Clone repository using HTTPS URL without token
          git clone https://github.com/zoilomendoza/grade-api-gitops.git gitops
          cd gitops
          
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s|image: .*|image: ${IMAGE}|g" deployment.yaml
          else
            sed -i "s|image: .*|image: ${IMAGE}|g" deployment.yaml
          fi
          
          # Commit changes
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}" || echo "No changes to commit"
          
          # Push
          git push -f https://${GIT_TOKEN}@github.com/zoilomendoza/grade-api-gitops.git main
